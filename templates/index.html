<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>VSL AI Translator</title>

<link rel="icon" href="data:," type="image/x-icon">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-4">

    <h2 class="text-center mb-4">
        VSL AI Translator
    </h2>

    <div class="row">

        <!-- CAMERA -->

        <div class="col-lg-7">

            <div class="card card-custom p-3">

                <div style="position: relative;">
                    <video
                        id="video"
                        autoplay
                        playsinline style="width: 100%; border-radius: 10px;">
                    </video>
                    <!-- Thẻ ảnh Overlay lọc nền đen bằng mix-blend-mode -->
                <img id="skeletonOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px; object-fit: cover; pointer-events: none; mix-blend-mode: screen; display: none;">
                </div>

                <canvas id="canvas"></canvas>

            </div>

        </div>

        <!-- INFO -->

        <div class="col-lg-5">

            <div class="info-box">

                <h5>Từ nhận diện</h5>

                <div
                    id="word"
                    class="result-text text-success">

                    ---
                </div>

            </div>

            <div class="info-box">

                <h5>Confidence</h5>

                <div
                    id="confidence"
                    class="confidence">

                    0
                </div>

            </div>

            <div class="info-box">

                <h5>Câu dịch</h5>

                <div id="sentence">

                    Chưa có dữ liệu

                </div>

            </div>

            <div class="info-box">

                <h5>Bộ đệm</h5>

                <div id="buffer">

                    0

                </div>

            </div>

            <div class="info-box">

                <h5>Tiến trình nhận diện</h5>

                <div class="progress" style="height: 25px; background: #4b5563;">
                    <div id="frameProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-info" role="progressbar" style="width: 0%; font-weight: bold; font-size: 14px;">0/60 Frames (Đang chờ...)</div>
                </div>

            </div>

            <div class="info-box">

                <h5>Ngưỡng hạ tay: <span id="thresholdValue">0.85</span></h5>

                <input
                    type="range"
                    class="form-range"
                    id="thresholdSlider"
                    min="0.5" max="1.0" step="0.05" value="0.85"
                    onchange="updateThreshold()">

            </div>

            <div class="info-box">

                <h5>Hiển thị khung xương</h5>

                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="skeletonToggle" checked onchange="toggleSkeleton()">
                    <label class="form-check-label" for="skeletonToggle" style="cursor: pointer;">Bật / Tắt</label>
                </div>

            </div>

            <button
                class="btn btn-success w-100 mb-2"
                onclick="translateNow()">

                Dịch Ngay

            </button>

            <button
                class="btn btn-danger w-100"
                onclick="resetAll()">

                Reset

            </button>

        </div>

    </div>

    <!-- VIDEO -->

    <div class="row mt-4">

        <div class="col-lg-12">

            <div class="card card-custom p-3">

                <h4>Upload Video</h4>

                <input
                    type="file"
                    id="videoUpload"
                    class="form-control">

                <button
                    class="btn btn-primary mt-3"
                    onclick="uploadVideo()">

                    Nhận Diện Video

                </button>

                <div
                    id="videoResult"
                    class="mt-3">

                </div>

            </div>

        </div>

    </div>

    <!-- DICTIONARY -->

    <div class="row mt-4 mb-5">

        <div class="col-lg-12">

            <div class="card card-custom p-3">

                <h4>Từ điển Ngôn ngữ ký hiệu</h4>
                
                <div class="row mt-3">
                    <div class="col-md-4">
                        <select id="vocabSelect" class="form-select mb-3" size="10" onchange="playVocabVideo()" style="background: #374151; color: white; border: none; scrollbar-width: thin;">
                        </select>
                    </div>
                    <div class="col-md-8">
                        <video id="vocabVideo" controls autoplay playsinline style="width: 100%; border-radius: 10px; background: #000; max-height: 400px;"></video>
                        <h5 id="vocabLabel" class="mt-2 text-center text-success"></h5>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
